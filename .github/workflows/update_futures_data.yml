name: Update China Futures Data

on:
  workflow_dispatch:
  schedule:
    - cron: "7 18 * * *" # 03:07 Asia/Tokyo on the following day

permissions:
  contents: write

concurrency:
  group: update-china-futures-signals
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh main-continuous CSV files
        run: python src/download_futures.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Export latest 5-day and 10-day signals
        run: python src/export_latest_signals.py

      - name: Validate signal payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("latest_signals.json").read_text(encoding="utf-8"))
          assert payload["schema_version"] == 1
          assert set(payload["products"]) == {"JM", "I", "SM", "CU"}
          for product in payload["products"].values():
              assert set(product["forecasts"]) == {"5", "10"}
          print("latest_signals.json validated")
          PY

      - name: Commit latest signal payload
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add latest_signals.json
          git diff --cached --quiet && exit 0
          git commit -m "Update XGBoost signals $(date -u +%F)"
          git pull --rebase
          git push
